services:
  md-editor:
    image: ghcr.io/mazaiguo/mdeditor:latest
    container_name: md-editor
    restart: unless-stopped
    pull_policy: always
    ports:
      - "5080:5080"
    environment:
      - PORT=5080
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
